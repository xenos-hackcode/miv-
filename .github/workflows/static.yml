name: Deploy Vite JSX Site

on:
  push:
    branches: ["main"] # Triggers every time you push code to your main branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build production site
        run: npm run build

      - name: Upload production files
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # This matches your Vite build folder!

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
